<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#111;display:flex;align-items:center;justify-content:center;padding-left:160px;min-height:100vh;font-family:sans-serif}
  .phone{position:relative;width:393px;height:852px;background:#000;border-radius:54px;border:10px solid #1a1a1a;box-shadow:0 0 0 2px #333,0 40px 80px rgba(0,0,0,.8),inset 0 0 0 2px #000;overflow:hidden}
  .phone::before{content:'';position:absolute;top:12px;left:50%;transform:translateX(-50%);width:120px;height:34px;background:#000;border-radius:20px;z-index:10}
  .phone::after{content:'';position:absolute;top:16px;right:30px;width:12px;height:12px;background:#1a1a1a;border-radius:50%;z-index:11}
  iframe{width:100%;height:100%;border:none;border-radius:44px}
  .side-btn{position:absolute;right:-12px;top:120px;width:4px;height:60px;background:#2a2a2a;border-radius:2px}
  .side-btn2{position:absolute;right:-12px;top:200px;width:4px;height:40px;background:#2a2a2a;border-radius:2px}
  .vol1{position:absolute;left:-12px;top:140px;width:4px;height:35px;background:#2a2a2a;border-radius:2px}
  .vol2{position:absolute;left:-12px;top:190px;width:4px;height:35px;background:#2a2a2a;border-radius:2px}
  .pwr{position:absolute;left:-12px;top:260px;width:4px;height:60px;background:#2a2a2a;border-radius:2px}
</style>
</head>
<body>
  <div class="phone">
    <div class="side-btn"></div>
    <div class="side-btn2"></div>
    <div class="vol1"></div>
    <div class="vol2"></div>
    <div class="pwr"></div>
    <iframe src="index.html"></iframe>
  </div>
</body>
</html>
